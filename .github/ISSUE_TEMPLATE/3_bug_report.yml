name: Bug report
description: Something is not working correctly
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, read the FAQ:
        https://github.com/USER/REPO/blob/main/faq.md

  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Firefox
        - Chrome
        - Brave
        - Edge
        - Opera
        - Vivaldi
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshot, error message, or anything else useful.
