name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Firefox
        - Chrome
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Select text on...
        2. Press Ctrl+Shift+F
        3. ...
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshot, error message, or anything else useful.

  - type: dropdown
    id: fix
    attributes:
      label: Can you fix it?
      options:
        - "No"
        - "Yes, I know how to fix it"
        - "Maybe, I have an idea"
    validations:
      required: true

  - type: textarea
    id: fix_desc
    attributes:
      label: If yes, describe your fix
      description: Optional. Describe how you would fix it.
